<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="mainstyle.css">
        <title>Bioprinter X</title>
    </head>
    <body>
        <div style="text-align:center"> 
        <button onclick="backwards()">Backwards</button> 
        <button onclick="pause()">Pause</button>
        <button onclick="forwards()">Forwards</button>
        <br><br>
        <video id="forward-video">
            <source src="forward.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        <video id="backward-video">
            <source src="backward.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        </div> 

        <script> 
            var forwardVideo = document.getElementById("forward-video");
            var backwardVideo = document.getElementById("backward-video");
            var visibleVideo = forwardVideo; 
            var hiddenVideo = backwardVideo; 
            visibleVideo.preload = "auto";
            hiddenVideo.preload = "auto";

            visibleVideo.play();

            var totalDuration = visibleVideo.duration;
            setInterval(updateTimestamp, 200);

            function backwards() { 
                swapVideos(backwardVideo, forwardVideo);
                hiddenVideo.pause();
                hiddenVideo.style.zIndex = 4;
                visibleVideo.style.zIndex = 5;
                visibleVideo.play();
            } 
            function pause() { 
                visibleVideo.pause(); 
                hiddenVideo.pause();
            } 
            function forwards() { 
                swapVideos(forwardVideo, backwardVideo);
                hiddenVideo.pause();
                hiddenVideo.style.zIndex = 4;
                visibleVideo.style.zIndex = 5;
                visibleVideo.play();
            } 
            function updateTimestamp() {
                var timestamp = visibleVideo.currentTime;
                hiddenVideo.currentTime = totalDuration - timestamp;
            }
            function swapVideos(visible, hidden){
                visibleVideo = visible;
                hiddenVideo = hidden;
            }
        </script> 
    </body>
</html>
